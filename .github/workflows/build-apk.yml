name: Build & Release APK

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK from EAS
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          curl -L "$APK_URL" -o AYONIME.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AYONIME ${{ github.ref_name }}
          body: |
            ## AYONIME ${{ github.ref_name }}

            ### Install
            1. Download `AYONIME.apk` below
            2. Open the file on your Android device
            3. Enable "Install from unknown sources" if prompted
            4. Install and enjoy

            ### What's new
            See commit history for changes.
          files: AYONIME.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
